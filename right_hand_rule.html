<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>右手の法則 (TextGeometry付き)</title>
  <style>
    body { margin: 0; background-color: #111; color: #fff; }
    #overlay {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.5); padding: 10px; border-radius: 4px;
      font-size: 14px;
    }
    #exportBtn {
      position: absolute; top: 10px; right: 10px;
      padding: 6px 12px; background: #007acc; color: #fff;
      border: none; border-radius: 4px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="overlay">
    右手の法則（親指 / 人差し指 / 中指）<br>
    ドラッグで回転、ホイールで拡大縮小、右ドラッグで平行移動
    <ul>
      <li style="color:#ff4444;">親指</li>
      <li style="color:#44ffcc;">人差し指</li>
      <li style="color:#4488ff;">中指</li>
    </ul>
  </div>
  <button id="exportBtn">Export glTF</button>
  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js";
    import { FontLoader } from "https://unpkg.com/three@0.152.2/examples/jsm/loaders/FontLoader.js";
    import { TextGeometry } from "https://unpkg.com/three@0.152.2/examples/jsm/geometries/TextGeometry.js";
    import { GLTFExporter } from "https://unpkg.com/three@0.152.2/examples/jsm/exporters/GLTFExporter.js";

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 5, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 光源
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // 矢印（親指=赤, 人差し指=緑, 中指=青）
    function addArrow(dir, color, labelPos, labelText) {
      const arrow = new THREE.ArrowHelper(dir.clone().normalize(), new THREE.Vector3(0,0,0), 3, color, 0.5, 0.3);
      scene.add(arrow);

      // ラベル用 3Dテキスト
      const fontLoader = new FontLoader();
      fontLoader.load("https://threejs.org/examples/fonts/helvetiker_regular.typeface.json", (font) => {
        const textGeo = new TextGeometry(labelText, {
          font: font,
          size: 0.4,
          height: 0.05,
          curveSegments: 12
        });
        const mat = new THREE.MeshStandardMaterial({ color: color });
        const textMesh = new THREE.Mesh(textGeo, mat);
        textMesh.position.copy(labelPos);
        scene.add(textMesh);
      });
    }

    addArrow(new THREE.Vector3(1,0,0), 0xff4444, new THREE.Vector3(3.2,0,0), "親指=力");
    addArrow(new THREE.Vector3(0,1,0), 0x44ffcc, new THREE.Vector3(0,3.2,0), "人差し指=磁界");
    addArrow(new THREE.Vector3(0,0,1), 0x4488ff, new THREE.Vector3(0,0,3.2), "中指=電流");

    // レンダリングループ
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // GLTFエクスポート
    document.getElementById("exportBtn").addEventListener("click", () => {
      const exporter = new GLTFExporter();
      exporter.parse(scene, (gltf) => {
        const blob = new Blob([JSON.stringify(gltf)], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "right_hand_rule.gltf";
        link.click();
      }, { binary: false });
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
