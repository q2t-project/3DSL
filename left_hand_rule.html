<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>左手の法則（簡易3Dハンド）</title>
  <style>
    html, body { height: 100%; margin: 0; background: #0b0f14; color: #e5e7eb; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", "Helvetica", Arial, sans-serif; }
    #app { position: fixed; inset: 0; display: grid; grid-template-rows: auto 1fr; }
    header { padding: 10px 14px; background: #0f172a; border-bottom: 1px solid #1f2937; display: flex; gap: 12px; align-items: center; }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: .02em; }
    header .hint { opacity: .75; font-size: 12px; }
    canvas { display: block; }
    .legend { position: absolute; right: 12px; top: 60px; background: rgba(15, 23, 42, .85); border: 1px solid #1f2937; border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.5; backdrop-filter: blur(8px); }
    .legend b { font-weight: 700; }
    .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: -1px; }
    header button {
  margin-left: auto;
  padding: 4px 10px;
  background: #1d4ed8;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
header button:hover {
  background: #2563eb;
}

  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>左手の法則（親指=力F / 人差し指=磁界B / 中指=電流I）</h1>
      <div class="hint">ドラッグで回転、ホイールで拡大縮小、右ドラッグで平行移動</div>
      <button id="export">Export glTF</button>
    </header>
    <div id="scene-root"></div>
    <div class="legend">
      <div><span class="dot" style="background:#ef4444"></span><b>親指</b> = 力 F（+X）</div>
      <div><span class="dot" style="background:#22c55e"></span><b>人差し指</b> = 磁界 B（+Y）</div>
      <div><span class="dot" style="background:#3b82f6"></span><b>中指</b> = 電流 I（+Z）</div>
      <div style="margin-top:6px; opacity:.75;">※ 左手を模した簡易モデル（球と円柱の組み合わせ）</div>
    </div>
  </div>


  <!-- Three.js & Controls -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"

  }
}


</script>

<!-- Three.js & Controls -->
<script type="module">

  import { GLTFExporter } from "three/examples/jsm/exporters/GLTFExporter.js";
  import { FontLoader }     from "three/examples/jsm/loaders/FontLoader.js";
  import { TextGeometry }   from "three/examples/jsm/geometries/TextGeometry.js";

  document.getElementById("export").addEventListener("click", () => {
    const exporter = new GLTFExporter();
    exporter.parse(
      scene,
      gltf => {
        const blob = new Blob([JSON.stringify(gltf)], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "line_model.gltf";
        link.click();
      },
      { binary: false }
    );
  });

  import * as THREE from "three";
  import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";

    const root = document.getElementById('scene-root');
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight - 48);
    renderer.setClearColor(0x0b0f14, 1);
    root.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight - 48), 0.1, 2000);
    camera.position.set(128, 128, 256);
    camera.lookAt(0, 1, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lights
    {
      const hemi = new THREE.HemisphereLight(0xffffff, 0x222233, 0.8);
      hemi.position.set(0, 1, 0);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(6, 8, 10);
      dir.castShadow = false;
      scene.add(dir);
    }

// JSONデータを変数として保持する
function addLine3(a, b, color) {
  const geom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(...a),
    new THREE.Vector3(...b)
  ]);
  const mat = new THREE.LineBasicMaterial({ color });
  scene.add(new THREE.Line(geom, mat));
}

function addArc3(center, normal, radius, start, end, color, segments=32) {
  const n = new THREE.Vector3(...normal).normalize();
  const tmp = Math.abs(n.x) < 0.9 ? new THREE.Vector3(1,0,0) : new THREE.Vector3(0,1,0);
  const u = tmp.clone().cross(n).normalize();
  const v = n.clone().cross(u).normalize();

  const pts = [];
  for (let i=0;i<=segments;i++){
    const t = THREE.MathUtils.lerp(start, end, i/segments);
    const p = new THREE.Vector3(...center)
                .addScaledVector(u, radius*Math.cos(t))
                .addScaledVector(v, radius*Math.sin(t));
    pts.push(p);
  }
  const geom = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color });
  scene.add(new THREE.Line(geom, mat));
}

function addEllipseArc3(center, normal, rx, ry, start, end, color, segments=64) {
  const n = new THREE.Vector3(...normal).normalize();
  const tmp = Math.abs(n.x) < 0.9 ? new THREE.Vector3(1,0,0) : new THREE.Vector3(0,1,0);
  const u = tmp.clone().cross(n).normalize();  // x方向基底
  const v = n.clone().cross(u).normalize();    // y方向基底

  const pts = [];
  for (let i=0; i<=segments; i++) {
    const t = THREE.MathUtils.lerp(start, end, i/segments);
    const p = new THREE.Vector3(...center)
      .addScaledVector(u, rx * Math.cos(t))
      .addScaledVector(v, ry * Math.sin(t));
    pts.push(p);
  }
  const geom = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color });
  scene.add(new THREE.Line(geom, mat));
}

// ---- add: TextGeometry helper ----
const FONT_URL = "https://threejs.org/examples/fonts/helvetiker_regular.typeface.json";
let __fontPromise = null;
function loadFontOnce(url = FONT_URL) {
  if (!__fontPromise) {
    const loader = new FontLoader();
    __fontPromise = new Promise((resolve, reject) => {
      loader.load(url, resolve, undefined, reject);
    });
  }
  return __fontPromise;
}

async function addText(text, position, opt = {}) {
  const {
    color = 0xffffff,
    size = 1,
    height = 0,
    curveSegments = 12,
    bevel = false,
    normal = [0, 0, 1],
    up = [0, 1, 0]
  } = opt;

  const font = await loadFontOnce();
  const geo = new TextGeometry(text, {
    font, size, height, curveSegments,
    bevelEnabled: bevel
  });

  const mat = new THREE.MeshStandardMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(position);

  const target = new THREE.Vector3().addVectors(mesh.position, new THREE.Vector3(...normal));
  mesh.up.copy(new THREE.Vector3(...up));
  mesh.lookAt(target);

  scene.add(mesh);
  return mesh;
}

const modelData = {
  "nodes": [
    {
      "id": "hand",
      "label": "左手の法則 線画",
      "geometry": {
        "primitives": [
          { "type": "arc3", "center": [ 64, 32, -8 ], "normal": [ 0, 1, 0 ], "radius": 8, "start": 0, "end": 3.1416, "color": 0x3b82f6 },
          { "type": "arc3", "center": [ 0, 96, 8 ], "normal": [ 1, 0, 0 ], "radius": 8, "start": 3.1416, "end": 0, "color": 0x22c55e },
          { "type": "arc3", "center": [ 0, 8, 64 ], "normal": [ -1, 0, 0 ], "radius": 8, "start": -1.5708, "end": 1.5708, "color": 0xef4444 },
          { "type": "arc3", "center": [ 32, 0, -24 ], "normal": [ 1, 0, 0 ], "radius": 8, "start": -3.1416, "end": 0, "color": 0x444444 },
          { "type": "arc3", "center": [ 32, 16, -40 ], "normal": [ 1, 0, 0 ], "radius": 8, "start": -3.1416, "end": 0, "color": 0x444444 },
          { "type": "arc3", "center": [ 16, 16, -48 ], "normal": [ 0, 0, -1 ], "radius": 16, "start": 1.5708, "end": -1.5708, "color": 0x444444 },
          { "type": "arc3", "center": [ 16, 16, -16 ], "normal": [ 0, 0, -1 ], "radius": 16, "start": 1.5708, "end": 0, "color": 0x444444 },
          { "type": "arc3", "center": [ 16, 16, -32 ], "normal": [ 0, 0, -1 ], "radius": 16, "start": 1.5708, "end": 0, "color": 0x444444 },
                
          { "type": "line3", "a": [ 0, 32, 0 ], "b": [ 64, 32, 0 ], "color": 0x3b82f6 },
          { "type": "line3", "a": [ 16, 32, -16 ], "b": [ 64, 32, -16 ], "color": 0x3b82f6 },
          { "type": "line3", "a": [ 0, 16, 16 ], "b": [ 0, 96, 16 ], "color": 0x22c55e },
          { "type": "line3", "a": [ 0, 32, 0 ], "b": [ 0, 96, 0 ], "color": 0x22c55e },
          { "type": "line3", "a": [ 0, 0, 32 ], "b": [ 0, 0, 64 ], "color": 0xef4444 },
          { "type": "line3", "a": [ 0, 16, 16 ], "b": [ 0, 16, 64 ], "color": 0xef4444 },
          { "type": "line3", "a": [ 32, 16, -16 ], "b": [ 32, 0, -16 ], "color": 0x444444 },
          { "type": "line3", "a": [ 32, 16, -32 ], "b": [ 32, 0, -32 ], "color": 0x444444 },
          { "type": "line3", "a": [ 0, 16, -48 ], "b": [ 0, 0, -48 ], "color": 0x444444 },

          { "type": "ellipseArc3", "center": [0, 0, -8], "normal": [1, 0, 0], "rx": 40, "ry": 64, "start": 0, "end": -0.7854, "color": 0x333333},
          { "type": "ellipseArc3", "center": [0, 0, -8], "normal": [1, 0, 0], "rx": 40, "ry": 64, "start": -2.3562, "end": -3.1416, "color": 0x333333},

          { "type": "text", "text": "φ", "position": [64, 40, 0], "normal": [0, 1, 0], "up": [0, 1, 0], "color": 0x3b82f6, "size": 8 },
          { "type": "text", "text": "ψ", "position": [0, 96, 8], "normal": [1, 0, 0], "up": [0, 1, 0], "color": 0x22c55e, "size": 8 },
          { "type": "text", "text": "μ", "position": [0, 0, 64], "normal": [1, 0, 0], "up": [0, 1, 0], "color": 0xef4444, "size": 8 }
        ]
      }
    }
  ]
};
for (const node of modelData.nodes) {
  for (const prim of node.geometry.primitives) {
    if (prim.type === "line3") { addLine3(prim.a, prim.b, prim.color); }
    if (prim.type === "arc3")  { addArc3(prim.center, prim.normal, prim.radius, prim.start, prim.end, prim.color); }
    if (prim.type === "ellipseArc3") { addEllipseArc3(prim.center, prim.normal, prim.rx, prim.ry, prim.start, prim.end, prim.color); }
    if (prim.type === "text") {
      addText(prim.text, new THREE.Vector3(...prim.position), {
        color: prim.color,
        size: prim.size,
        height: prim.height,
        normal: prim.normal || [0,0,1],   // JSONで指定できる
        up: prim.up || [0,1,0]
      });
    }
  }
}


    // Resize
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight - 48);
      camera.aspect = window.innerWidth / (window.innerHeight - 48);
      camera.updateProjectionMatrix();
    });

    // Animate
    renderer.setAnimationLoop(() => {
      controls.update();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
