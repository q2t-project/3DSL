<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3DSL Viewer (dev harness)</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050505;
      color: #f5f5f5;
    }
    body {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 0;
      height: 100vh;
      overflow: hidden;
    }
    #viewer-root {
      background: #000;
      position: relative;
      width: 100%;
      height: 100%;
    }
    #sidebar {
      border-left: 1px solid #2b2b2b;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #0d0d0d;
    }
    #sidebar h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    #controls {
      border: 1px solid #222;
      padding: 6px;
      min-height: 32px;
      font-size: 12px;
      color: #888;
    }
    pre {
      margin: 0;
      padding: 6px;
      background: #000;
      color: #39ff14;
      font-family: "Consolas", "SFMono-Regular", ui-monospace, Menlo, Monaco, monospace;
      font-size: 11px;
      overflow: auto;
      flex: 1;
    }
    #log {
      border: 1px solid #1f1f1f;
    }
    #summary {
      border: 1px solid #1f1f1f;
    }
  </style>
</head>
<body>
  <div id="viewer-root" aria-label="3DSL viewer canvas"></div>
  <aside id="sidebar">
    <h1>3DSL Viewer (dev)</h1>
    <div id="controls">dev harness controls TBD</div>
    <pre id="summary">{}</pre>
    <pre id="log"></pre>
  </aside>

  <script type="module" src="./viewerDevHarness.js"></script>
</body>
</html>
