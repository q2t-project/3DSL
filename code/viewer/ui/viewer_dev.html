<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3DSL Viewer (dev harness)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: grid;
      grid-template-columns: 2fr 1fr;
      height: 100vh;
      overflow: hidden;
      background: #050505;
      color: #eee;
    }
    #viewer-root {
      background: #000;
      position: relative;
    }
    #sidebar {
      border-left: 1px solid #444;
      padding: 8px;
      box-sizing: border-box;
      background: #101010;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 12px;
    }
    #summary, #log {
      flex: 1;
      overflow: auto;
      background: #000;
      color: #0f0;
      padding: 4px;
      font-family: "Consolas", ui-monospace, Menlo, Monaco, monospace;
      font-size: 11px;
    }
    #controls {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }
    #controls input[type="text"] {
      flex: 1;
      min-width: 0;
      background: #050505;
      border: 1px solid #333;
      color: #eee;
      padding: 4px;
    }
    #controls button {
      background: #1e90ff;
      color: #fff;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="viewer-root"></div>
  <aside id="sidebar">
    <h1 style="margin:0;font-size:14px;">3DSL Viewer (dev)</h1>
    <div>
      <label for="samplePath">core_viewer_baseline.3dss.json</label>
      <div id="controls">
        <input id="samplePath" type="text" size="40"
               value="/data/sample/core_viewer_baseline.3dss.json" />
        <button id="reloadBtn">Load</button>
      </div>
    </div>
    <pre id="summary">{}</pre>
    <pre id="log"></pre>
  </aside>

  <script type="module" src="./viewerDevHarness.js"></script>
</body>
</html>
