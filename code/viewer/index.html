<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3DSL Viewer Bridge Test</title>
    <link rel="stylesheet" href="./ui/viewer.css" />
  </head>
  <body>
    <div id="viewer-root"></div>

    <script type="module">
      import Ajv from "../vendor/ajv/ajv2020.mjs";
      import * as THREE from "../vendor/three/three.module.js";
      import { registerDefaultFormats } from "../validator/interface.js";
      import { initValidationBridge, validateModelData } from "./validator/validation-bridge.js";

      const ajv = new Ajv({ allErrors: true, strict: false });
      registerDefaultFormats(ajv);
      console.log("✅ AJV initialized");

      const root = document.getElementById("viewer-root");
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
      camera.position.set(0.25, 0.25, 1.25);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(600, 400);
      root.appendChild(renderer.domElement);

      const sphereGeometry = new THREE.SphereGeometry(0.05, 32, 16);
      const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff80 });
      const sphereMesh = new THREE.Mesh(sphereGeometry, sphereMaterial);
      scene.add(sphereMesh);
      renderer.render(scene, camera);
      console.log("✅ THREE.Scene initialized");

      const bridge = await initValidationBridge(scene);
      if (bridge) {
        console.log("✅ Validation Bridge initialized");
      }

      const mockModel = {
        point: [
          {
            id: "00000000-0000-4000-8000-000000000001",
            meta: { name: "Bridge Validator Probe" },
            appearance: { color: "#00ff80" },
            origin: { position: [0, 0, 0] },
            links: []
          }
        ]
      };

      try {
        const result = await validateModelData(mockModel, { ajv });
        if (result?.valid === true && Array.isArray(result.errors)) {
          console.log("✅ Bridge→Validator result: { valid: true, errors: [] }");
        } else {
          console.error("❌ Bridge→Validator unexpected result:", result);
        }
      } catch (error) {
        console.error("❌ Bridge→Validator error:", error);
      }
    </script>
  </body>
</html>
