<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>3DSD Preview</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.158.0",
        "OrbitControls": "https://esm.sh/three@0.158.0/examples/jsm/controls/OrbitControls.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "OrbitControls";

    let scene, camera, renderer, controls;
    let objectsGroup = new THREE.Group();

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf0f0f0);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.set(5, 5, 5);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(5, 10, 7);
      scene.add(light);
      scene.add(new THREE.AmbientLight(0x888888));

      scene.add(objectsGroup);

      window.addEventListener("resize", onWindowResize);
      window.addEventListener("message", onMessage);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onMessage(event) {
      const msg = event.data;
      if (msg.type === "updateModel") {
        updateScene(msg.data);
      }
    }

    function updateScene(model) {
      objectsGroup.clear(); // 既存オブジェクトをクリア
      if (!model) return;

      // ノード描画
      const nodeGeo = new THREE.SphereGeometry(0.1, 16, 16);

      if (model.nodes) {
        model.nodes.forEach(n => {
          const nlabel = n.label || {};
          const color = nlabel.color || "#0077ff";
          const opacity = nlabel.opacity != null ? nlabel.opacity : 1.0;

          const mat = new THREE.MeshPhongMaterial({
            color: new THREE.Color(color),
            opacity: opacity,
            transparent: opacity < 1.0
          });

          const mesh = new THREE.Mesh(nodeGeo, mat);
          if (n.position) {
            mesh.position.set(n.position[0], n.position[1], n.position[2]);
          }
        if (nlabel.text) {
          const sprite = makeTextSprite(nlabel.text, {
            fontSize: nlabel.fontSize || 24,
        color: nlabel.color || "#000",
        background: nlabel.background,
        opacity: nlabel.opacity != null ? nlabel.opacity : 1.0
        });
        sprite.position.set(mesh.position.x, mesh.position.y + 0.3, mesh.position.z);
        objectsGroup.add(sprite);
        }
        });
      }

// エッジ描画
    if (model.edges) {
      model.edges.forEach(e => {
        const src = model.nodes.find(n => n.id === e.source);
        const tgt = model.nodes.find(n => n.id === e.target);
        if (src && tgt && src.position && tgt.position) {
          const points = [
            new THREE.Vector3(...src.position),
            new THREE.Vector3(...tgt.position)
          ];
          const geo = new THREE.BufferGeometry().setFromPoints(points);

          const color = e.color || "#000000";
          const opacity = e.opacity != null ? e.opacity : 1.0;

          const mat = new THREE.LineBasicMaterial({
            color: new THREE.Color(color),
            opacity: opacity,
            transparent: opacity < 1.0
          });

          const line = new THREE.Line(geo, mat);
          objectsGroup.add(line);
        }
      });
    }
  }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

function makeTextSprite(message, parameters = {}) {
  const fontSize = parameters.fontSize || 24;
  const fontFace = "sans-serif";
  const color = parameters.color || "#000000";
  const background = parameters.background || null;
  const opacity = parameters.opacity != null ? parameters.opacity : 1.0;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  ctx.font = `${fontSize}px ${fontFace}`;
  const textWidth = ctx.measureText(message).width;

  canvas.width = textWidth + 20;
  canvas.height = fontSize * 2;
  ctx.font = `${fontSize}px ${fontFace}`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  if (background) {
    ctx.fillStyle = background;
    ctx.globalAlpha = opacity;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1.0;
  }

  ctx.fillStyle = color;
  ctx.fillText(message, canvas.width / 2, canvas.height / 2);

  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(material);

  sprite.scale.set(canvas.width / 100, canvas.height / 100, 1);
  return sprite;
}

</script>
</body>
</html>
