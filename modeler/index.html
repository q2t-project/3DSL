<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>3DSD-modeler</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- ImportMap: Three / OrbitControls / Ajv -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "ajv": "https://esm.sh/ajv@8/dist/2020?bundle"
    }
  }
  </script>

  <style>
    /* レイアウト: ヘッダー + 3カラム（左=リスト, 中央=3D, 右=プロパティ） */
    html,body{height:100%;margin:0}
    #app{display:grid;grid-template-rows:auto 1fr;height:100%}
    header{display:flex;gap:.5rem;align-items:center;background:#222;color:#fff;padding:.5rem}
    main{display:grid;grid-template-columns:300px 1fr 320px;min-height:0}
    #left,#right{background:#f5f5f5;overflow:auto;padding:.5rem}
    #viewer{background:#000;position:relative}
    #statusbar{background:#111;color:#ccc;padding:.25rem .5rem;font:12px/1.6 system-ui}
    .row{display:flex;gap:.5rem;align-items:center}
    .spacer{flex:1}
    tr.selected { background: #cde8ff; }
    td.cell-missing { background: #ffe0e0; }
  </style>
</head>
<body>
<div id="app">

  <!-- =========================================================
       ヘッダー（UI 操作）  [modeler_spec.md: §8 UI操作]
       - 新規, 開く, 保存
       - プレビュー（別ウィンドウ: preview.html + postMessage）
       - Undo / Redo（history.js）
       - Layers表示切替（Nodes/Edges/Labels/Aux）
       ========================================================= -->
  <header>
    <!-- JSON I/O -->
    <button id="btnNew">新規</button>            <!-- 空の v2 JSON 生成 -->
    <input  id="fileOpen" type="file" accept=".json" />
    <button id="btnSave">保存</button>            <!-- Blob ダウンロード -->

    <!-- プレビュー分離 -->
    <button id="btnPreview">プレビュー</button>   <!-- window.open("preview.html") -->

    <!-- Undo/Redo -->
    <button id="btnUndo" disabled>Undo</button>   <!-- Ctrl+Z / Cmd+Z -->
    <button id="btnRedo" disabled>Redo</button>   <!-- Ctrl+Y / Shift+Ctrl+Z -->

    <div class="spacer"></div>

    <!-- Layers（表示ON/OFF） -->
    <div class="row" id="layersRow">
      <label><input type="checkbox" id="layerNodes"   checked>Nodes</label>
      <label><input type="checkbox" id="layerEdges"   checked>Edges</label>
      <label><input type="checkbox" id="layerLabels"  checked>Labels</label>
      <label><input type="checkbox" id="layerAux"     checked>Aux</label>
    </div>
  </header>

  <main>
    <!-- =========================================================
         左ペイン：ノード／エッジ一覧 [§3 ノード編集, §4 エッジ編集]
         - それぞれテーブル（ID/pos/label.*, source/target/label.* など）
         - 追加・削除・編集（CRUD）
         - source/target はノードIDドロップダウン
         - 編集のたびに pushState()（Undo/Redo）
         ========================================================= -->
    <section id="left">
      <h3>ノード一覧</h3>
      <div class="row">
        <button id="btnNodeAdd">ノード追加</button>
        <button id="btnNodeDel" disabled>選択削除</button>
      </div>
      <!-- ノード表: ID | X | Y | Z | label.text | fontSize | plane | color | background | opacity -->
      <table id="tblNodes">
        <thead>
          <tr>
            <th>ID</th><th>X</th><th>Y</th><th>Z</th>
            <th>label.text</th><th>fontSize</th><th>plane</th>
            <th>color</th><th>background</th><th>opacity</th>
          </tr>
        </thead>
        <tbody><!-- JSで行を構築（セル編集 = 即時反映 + pushState） --></tbody>
      </table>

      <h3 style="margin-top:1rem">エッジ一覧</h3>
      <div class="row">
        <button id="btnEdgeAdd">エッジ追加</button>
        <button id="btnEdgeDel" disabled>選択削除</button>
      </div>
      <!-- エッジ表: source | target | color | opacity | label.text | fontSize | plane | label.color | label.background | label.opacity -->
      <table id="tblEdges">
        <thead>
          <tr>
            <th>source</th><th>target</th>
            <th>color</th><th>opacity</th>
            <th>label.text</th><th>fontSize</th><th>plane</th>
            <th>label.color</th><th>label.background</th><th>label.opacity</th>
          </tr>
        </thead>
        <tbody><!-- JSで行を構築（source/targetはノードIDドロップダウン） --></tbody>
      </table>
    </section>

    <!-- =========================================================
         中央：3Dビュー [§1 基本構成, §5 Aux, §8 Layers]
         - Three.js Canvas
         - OrbitControls
         - Layer別グループ（nodes/edges/labels/aux）
         - ドラッグでノード座標変更 → JSON反映 → pushState
         ========================================================= -->
    <section id="viewer">
      <!-- CanvasはJSで作成/挿入。レイヤ切替は Group.visible 切替で対応 -->
      <!-- Fit to Scene / カメラ状態保持（共有URLは将来拡張） -->
    </section>

    <!-- =========================================================
         右ペイン：プロパティ編集 [§6 プロパティ編集パネル]
         - 選択対象（ノード/エッジ/Aux）に応じたフォーム切替
         - 現段階は表セル編集が主。将来、ここにフォームを段階移行
         ========================================================= -->
    <section id="right">
      <h3>プロパティ</h3>
      <!-- 選択対象が無い場合は案内表示 -->
      <div id="propEmpty">左の一覧または3Dビューで対象を選択してください。</div>
      <!-- 選択ノード用フォーム（将来拡張）：id / pos[x,y,z] / label.* -->
      <!-- 選択エッジ用フォーム（将来拡張）：source/target / label.* -->
      <!-- 選択Aux用フォーム（将来拡張）：grid/axis 各属性 -->
    </section>
  </main>

  <!-- ステータス＆エラー表示（共通） [§2 JSON I/O バリデーション] -->
  <div id="statusbar">
    <span id="statusText">未検証</span>
    <span id="counts"></span>
    <!-- バリデーションエラーは下部にテーブルで可視化（簡易ログ） -->
  </div>
  <div id="errors"><!-- Ajv errors table --></div>

</div>

<script type="module">
  import * as THREE from "three";
  import { OrbitControls } from "three/addons/controls/OrbitControls.js";
  import Ajv from "ajv";
  /* Undo/Redo は独立モジュール（history.js） [§7 ストレージと履歴管理] */
  import { initHistory, pushState, undo, redo, canUndo, canRedo } from "./history.js";

  // ============================================================
  // アプリ状態（単一ソース・オブ・トゥルース）
  //   modelData: 現在の3DSS v2 JSON
  //   schema: 3DSS.schema.json（Ajv）
  //   previewWindow: 別窓ハンドル
  //   groups: {nodes, edges, labels, aux} Three.js グループ
  //   localStorageKey: "3dsd:model:current"
  // ============================================================
  let modelData = null;
  let schema = null;
  let ajv = new Ajv({ allErrors: true });
  let previewWindow = null;
  let lastSelectedNodeId = null;
  let lastSelectedEdgeIndex = null;
  let editingEdgeField = null; // "source" or "target"
  let editingEdgeIndex = null; // 編集対象のedge行インデックス
  const localStorageKey = "3dsd:model:current";

  // 選択管理（行クリックでトグル選択）
const selectedNodeIds = new Set();
const selectedEdgeIdx = new Set();

function updateSelectionUI() {
  document.getElementById("btnNodeDel").disabled = selectedNodeIds.size === 0;
  document.getElementById("btnEdgeDel").disabled = selectedEdgeIdx.size === 0;
}

  // ============================================================
  // 初期化シーケンス [§1, §2, §7]
  // - Threeシーン/カメラ/レンダラ/Controls 構築
  // - Ajvスキーマ読込
  // - localStorage から復元（あれば）
  // - history.initHistory() と最初の pushState()
  // - UIイベント紐付け（ボタン/ショートカット/テーブル編集）
  // - レイヤーチェックボックス → Group.visible 連動
  // ============================================================
    document.getElementById("btnNodeDel").addEventListener("click", deleteSelectedNodes);
    document.getElementById("btnEdgeDel").addEventListener("click", deleteSelectedEdges);
  
  function initApp(){ /* TODO: 実装 */ }

  function commit() {
    pushState(modelData);
    saveAndValidate();
  }

  // ============================================================
  // JSON I/O [§2]
  // - 新規: v2 の空雛形生成（meta/nodes/edges/aux）
  // - 開く: ファイル選択 → JSON.parse → validate → setModel()
  // - 保存: Blob ダウンロード
  // - バリデーション: Ajv.validate(schema, modelData)
  // - 一意性チェック: ID重複 / edge参照整合
  // - versionチェック: meta.version === "v2" 必須
  // ============================================================
  async function loadSchema() {
  try {
    // 3DSS用スキーマを読み込む（draft-2020-12はAjvに既に内蔵されている）
    const res = await fetch("../schemas/3DSS.schema.json");
    schema = await res.json();

    // Ajv初期化（strict:false で未知format警告を抑制）
    ajv = new Ajv({ allErrors: true, strict: false });
    ajv.compile(schema);

  } catch (e) {
    showError("スキーマ読み込み失敗: " + e.message);
  }
}

function newModel() {
  const json = {
    meta: {
      version: "v2",
      title: "untitled",
      date: new Date().toISOString().split("T")[0]
    },
    nodes: [],
    edges: [],
    aux: []
  };
  setModel(json);
  commit();
}

function openFile(evt) {
    const file = evt.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const json = JSON.parse(e.target.result);
        setModel(json);
        commit();
      } catch (err) {
        showError("JSON parse error: " + err.message);
      }
    };
    reader.readAsText(file);
  }

function saveFile() {
  if (!modelData) return;
  const blob = new Blob([JSON.stringify(modelData, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (modelData.meta?.title || "3dsd_model") + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
}

  // ============================================================
  // モデル適用＆UI反映 [全体]
  // - setModel(json): modelData更新 → テーブル再描画 → 3D再描画
  // - counts/stats 更新、エラー表示更新、localStorage保存
  // - saveAndValidate(): ★一本化ルール★
  //   - (1) modelData を保存(localStorage)
  //   - (2) validate（Ajv + 一意性 + version）
  //   - (3) プレビューへ postMessage（preview が開いていれば）
  //   - (4) Undo/Redo の状態（canUndo/canRedo）に合わせUI更新
  //   ※ 二重定義禁止／ここに集約（運用ルール）
  // ============================================================
function setModel(json) {
  // auxが無ければ空配列を補う
  if (!Array.isArray(json.aux)) json.aux = [];
  if (!Array.isArray(json.nodes)) json.nodes = [];
  if (!Array.isArray(json.edges)) json.edges = [];
  if (!json.meta) json.meta = { version:"v2", title:"untitled", date:new Date().toISOString() };

    modelData = json;

  // ノード一覧を再描画
  renderNodes();

  // エッジ一覧を再描画（次ステップで実装する予定）
  if (typeof renderEdges === "function") {
    renderEdges();
    updateCounts();
  }

  // TODO: Aux 表の再描画
  // TODO: 3Dビューの再描画
  // TODO: counts/stats更新
}

function saveAndValidate(){
      if (!modelData) return;

      localStorage.setItem(localStorageKey, JSON.stringify(modelData));

      let errors = [];
      let valid = true;

      if(schema){
        valid = ajv.validate(schema, modelData);
        if(!valid){
          errors.push(...ajv.errors.map(e => `${e.instancePath} ${e.message}`));
        }
      }

      // TODO: uniqueness checksなど

      showValidation(errors);

      // プレビュー送信
      if(valid){
        postToPreview(modelData);
      }

      document.getElementById("btnUndo").disabled = !canUndo();
      document.getElementById("btnRedo").disabled = !canRedo();

      return errors.length===0;
    }


  // UI更新
  setModel(modelData);

  // エラー表示
    function showValidation(errors){
      const st=document.getElementById("status");
      if(errors.length){
        st.textContent="Errors: "+errors.join("; ");
        st.style.color="red";
      }else{
        st.textContent=`OK nodes:${(modelData.nodes||[]).length} edges:${(modelData.edges||[]).length} aux:${(modelData.aux||[]).length}`;
        st.style.color="#0f0";
      }
    }
  // TODO: プレビュー送信 (postMessage)
  if(valid){
    localStorage.setItem("modelData", JSON.stringify(modelData,null,2));
    postToPreview(modelData);
  }

  // Undo/Redo ステータス更新
    document.getElementById("btnUndo").disabled = !canUndo();
    document.getElementById("btnRedo").disabled = !canRedo();

  // TODO: ステータスバー更新

  return errors.length === 0;
}

  // ============================================
  // エラーハンドリング
  // ============================================
  function showValidation(errors) {
    const status = document.getElementById("statusText");
    const errDiv = document.getElementById("errors");
    if (errors.length === 0) {
      status.textContent = "OK";
      status.style.color = "lightgreen";
      errDiv.innerHTML = "";
    } else {
      status.textContent = "エラーあり";
      status.style.color = "red";
      errDiv.innerHTML = "<ul>" + errors.map(e => `<li>${e}</li>`).join("") + "</ul>";
    }
  }
  function showError(msg) {
    showValidation([msg]);
  }

  // ============================================
  // 起動時処理
  // ============================================
  window.addEventListener("DOMContentLoaded", async () => {
    document.getElementById("btnPreview").addEventListener("click", openPreview);
    await loadSchema();
    initHistory();

    document.getElementById("btnNew").addEventListener("click", () => {
  newModel();
});
    document.getElementById("btnSave").addEventListener("click", saveFile);
    document.getElementById("fileOpen").addEventListener("change", openFile);
    document.getElementById("btnNodeAdd").addEventListener("click", addNode);
    document.getElementById("btnEdgeAdd").addEventListener("click", addEdge);

    document.getElementById("btnUndo").addEventListener("click", onUndo);
    document.getElementById("btnRedo").addEventListener("click", onRedo);

// ショートカット
  window.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === "z") {
      e.preventDefault();
      onUndo();
    }
    if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === "y" || (e.shiftKey && e.key.toLowerCase() === "z"))) {
      e.preventDefault();
      onRedo();
    }
  }, { capture: true }); // ← キャプチャ段階で拾う

    // localStorage復元
    const saved = localStorage.getItem(localStorageKey);
    if (saved) {
      try { setModel(JSON.parse(saved)); }
      catch(e){}
    }
    commit();
  });

  // ============================================
  // 共通ユーティリティ
  // ============================================

function createTextCell(value, onChange) {
  const td = document.createElement("td");
  const input = document.createElement("input");
  input.type = "text";
  input.value = value;
  input.addEventListener("change", () => { onChange(input.value); commit(); });
  td.appendChild(input);
  return td;
}

function createNumberCell(value, onChange) {
  const td = document.createElement("td");
  const input = document.createElement("input");
  input.type = "number";
  input.value = value;
  input.addEventListener("change", () => { onChange(Number(input.value)); commit(); });
  td.appendChild(input);
  return td;
}

function createAutoCompleteCell(value, options, onChange) {
  const td = document.createElement("td");

  // 入力ボックス
  const input = document.createElement("input");
  input.type = "text";
  input.value = value || "";

  // 候補リスト
  const dataList = document.createElement("datalist");
  const listId = "list-" + Math.random().toString(36).substr(2, 9);
  dataList.id = listId;

  // 候補を流し込み
  options.forEach(opt => {
    const option = document.createElement("option");
    option.value = opt;
    dataList.appendChild(option);
  });

  // 入力欄に datalist を紐づけ
  input.setAttribute("list", listId);

  // 値変更時の処理
  input.addEventListener("change", () => {
    const newValue = input.value;
    onChange(newValue);

    // 値が候補に存在しない場合は背景赤にする
    if (!options.includes(newValue)) {
      input.style.backgroundColor = "#ffdddd";
    } else {
      input.style.backgroundColor = "";
    }
  });

  td.appendChild(input);
  td.appendChild(dataList);
  return td;
}

function updateCounts() {
  const c  = document.getElementById("counts");
  const n = modelData?.nodes?.length ?? 0;
  const e = modelData?.edges?.length ?? 0;
  const a = modelData?.aux?.length ?? 0;

  c.textContent  = ` nodes:${n} edges:${e} aux:${a}`;
}

  // ============================================================
  // ノード編集 [§3]
  // - 追加: 既定位置（原点近傍）に新規ID
  // - 削除: 選択ノードを除去（関連エッジも削除）
  // - 編集: セル編集で即時反映（id/pos/label.*）
  // - 3Dビュー: ノードクリックで選択／ドラッグで pos 更新
  // - ラベル管理: nlabel（ノード専用）と elabel（エッジ専用）を厳密分離
  // - 各操作後: pushState() → saveAndValidate()
  // ============================================================
  function onNodeCellEdit(/* row, col, value */){ /* TODO */ }
  function onNodeDrag(/* id, newPos */){ /* TODO */ }

  // ノード表の再描画
function renderNodes() {
  const tbody = document.querySelector("#tblNodes tbody");
  tbody.innerHTML = "";
  for (const node of modelData.nodes) {
    const tr = document.createElement("tr");
    tr.dataset.id = node.id;
    if (selectedNodeIds.has(node.id)) tr.classList.add("selected");
    tr.addEventListener("click", (event) => {
  if (event.shiftKey && lastSelectedNodeId) {
    // 範囲選択
    const ids = modelData.nodes.map(n => n.id);
    const start = ids.indexOf(lastSelectedNodeId);
    const end = ids.indexOf(node.id);
    if (start >= 0 && end >= 0) {
      const [min, max] = [Math.min(start, end), Math.max(start, end)];
      selectedNodeIds.clear(); // 範囲選択は一度クリアして範囲全体を選択
      for (let i = min; i <= max; i++) {
        selectedNodeIds.add(ids[i]);
      }
    }
  } else if (event.ctrlKey || event.metaKey) {
    // 個別トグル
    if (selectedNodeIds.has(node.id)) selectedNodeIds.delete(node.id);
    else selectedNodeIds.add(node.id);
    lastSelectedNodeId = node.id;
  } else {
    // 単独選択
    selectedNodeIds.clear();
    selectedNodeIds.add(node.id);
    lastSelectedNodeId = node.id;
  }
  renderNodes();
  updateSelectionUI();
});

    // 既存のセル生成ロジックを維持しつつ、最小構成を確保
    // ID
    const tdId = document.createElement("td");
    const idInp = document.createElement("input");
    idInp.type = "text";
    idInp.value = node.id;
    idInp.addEventListener("change", () => { node.id = idInp.value; commit(); });
    tdId.appendChild(idInp);
    tr.appendChild(tdId);

    // X Y Z
    for (let i = 0; i < 3; i++) {
      const td = document.createElement("td");
      const inp = document.createElement("input");
      inp.type = "number";
      inp.value = node.pos?.[i] ?? 0;
      inp.addEventListener("change", () => { node.pos[i] = Number(inp.value); commit(); });
      td.appendChild(inp);
      tr.appendChild(td);
    }

    // label.text
    const tdText = document.createElement("td");
    const textInp = document.createElement("input");
    textInp.type = "text";
    textInp.value = node.label?.text ?? "";
    textInp.addEventListener("change", () => { node.label.text = textInp.value; commit(); });
    tdText.appendChild(textInp);
    tr.appendChild(tdText);

    tbody.appendChild(tr);
  }
}

function addNode() {
    if (!modelData) return;
    const newId = "n" + (modelData.nodes.length + 1);
    modelData.nodes.push({ id: newId, pos:[0,0,0], label:{text:""} });
    commit();
    renderNodes();
  }

  function deleteSelectedNodes() {
  if (selectedNodeIds.size === 0) return;

  // ノード本体を削除
  modelData.nodes = modelData.nodes.filter(n => !selectedNodeIds.has(n.id));

  // 削除されたノードを参照するエッジを同時に掃除
  const aliveIds = new Set(modelData.nodes.map(n => n.id));
  modelData.edges = modelData.edges.filter(e => aliveIds.has(e.source) && aliveIds.has(e.target));

  selectedNodeIds.clear();
  commit();            // ← 履歴に積む（Undoで戻せる）
  renderNodes();
  renderEdges();
  updateSelectionUI();
}

  // ============================================================
  // エッジ編集 [§4]
  // - 追加: source/target をノードIDドロップダウンで指定
  // - 削除: 選択エッジ除去
  // - 編集: color/opacity/label.*（elabel）をセル編集
  // - 各操作後: pushState() → saveAndValidate()
  // ============================================================
  function onEdgeCellEdit(/* row, col, value */){ /* TODO */ }

function renderEdges() {
  const tbody = document.querySelector("#tblEdges tbody");
  tbody.innerHTML = "";
  modelData.edges.forEach((edge, i) => {
    const tr = document.createElement("tr");
    tr.dataset.index = String(i);
    if (selectedEdgeIdx.has(i)) tr.classList.add("selected");
    tr.addEventListener("click", (event) => {
      if (event.shiftKey && lastSelectedEdgeIndex !== null) {
        const [min, max] = [Math.min(lastSelectedEdgeIndex, i), Math.max(lastSelectedEdgeIndex, i)];
        for (let j = min; j <= max; j++) {
          selectedEdgeIdx.add(j);
        }
      } else if (event.ctrlKey || event.metaKey) {
        if (selectedEdgeIdx.has(i)) selectedEdgeIdx.delete(i);
        else selectedEdgeIdx.add(i);
        lastSelectedEdgeIndex = i;
      } else {
        selectedEdgeIdx.clear();
        selectedEdgeIdx.add(i);
        lastSelectedEdgeIndex = i;
      }
      renderEdges();
      updateSelectionUI();
    });

    // source セル
  const tdS = createAutoCompleteCell(
    edge.source,
    modelData.nodes.map(n => n.id),
    newValue => { edge.source = newValue; }
  );
  if (!edge.source) tdS.classList.add("cell-missing");
  tr.appendChild(tdS);
  // sourceセルをクリックしたら「source編集中」に設定
  tdS.addEventListener("click", () => {
    editingEdgeField = "source";
    editingEdgeIndex = i;  // i は edge の行インデックス
  });

    // target セル
  const tdT = createAutoCompleteCell(
    edge.target,
    modelData.nodes.map(n => n.id),
    newValue => { edge.target = newValue; }
  );
  if (!edge.target) tdT.classList.add("cell-missing");
  tr.appendChild(tdT);
  tdT.addEventListener("click", () => {
    editingEdgeField = "target";
    editingEdgeIndex = i;
  });

    // label.text
    const tdText = createTextCell(edge.label?.text, newValue => { (edge.label ||= {}).text = newValue; });
    tr.appendChild(tdText);

    tbody.appendChild(tr);
  });
}

function addEdge() {
  // 新しいエッジを未設定で追加
  modelData.edges.push({ source: "", target: "", label: { text: "" } });
  commit();
  renderEdges();
}

function deleteSelectedEdges() {
  if (selectedEdgeIdx.size === 0) return;

  modelData.edges = modelData.edges.filter((_, i) => !selectedEdgeIdx.has(i));

  selectedEdgeIdx.clear();
  commit();            // ← 履歴に積む
  renderEdges();
  updateSelectionUI();
}

function onNodeClick(nodeId) {
  if (editingEdgeField && editingEdgeIndex != null) {
    const edge = modelData.edges[editingEdgeIndex];
    edge[editingEdgeField] = nodeId;
    commit();
    renderEdges();

    // リセット
    editingEdgeField = null;
    editingEdgeIndex = null;
  }
}

// 例: Raycasterでノードヒットしたとき
if (intersects.length > 0) {
  const picked = intersects[0].object;
  const nodeId = picked.userData.id;
  onNodeClick(nodeId);
}

    previewWindow = window.open("preview.html","previewWindow");
  } else {

}

  function postToPreview(data){
  if(previewWindow && !previewWindow.closed){
    previewWindow.postMessage({ type:"updateModel", data:data }, "*");
  }
}
