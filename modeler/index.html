<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>3DSD-modeler (Phase 2: Node Editing)</title>
  <style>
    body { font-family: sans-serif; margin: 10px; }
    h1 { font-size: 20px; }
    table { border-collapse: collapse; margin: 10px 0; }
    th, td { border: 1px solid #ccc; padding: 2px 4px; text-align: center; }
    th { background: #f8f8f8; }
    input { width: 80px; }
    .ok { background: #cfc; padding: 10px; }
    .error { background: #fcc; padding: 10px; }
    .container { display: flex; justify-content: space-between; }
    .nodes, .edges { flex: 1; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>3DSD-modeler (Phase 2: Node Editing)</h1>
  <input type="file" id="fileInput">
  <button onclick="download()">保存（ダウンロード）</button>
  <button onclick="openPreview()">プレビューを開く</button>
  <div id="status">未検証</div>

  <div class="container">
    <div class="edges">
      <h2>エッジ一覧</h2>
      <table id="edgesTable"></table>
    </div>
    <div class="nodes">
      <h2>ノード一覧</h2>
      <table id="nodesTable"></table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ajv@8/dist/ajv.bundle.js"></script>
  <script>
    let model = { meta:{}, nodes:[], edges:[], auxiliary:[] };
    let previewWindow = null;

    function saveAndValidate() {
      localStorage.setItem("model", JSON.stringify(model));
      document.getElementById("status").className = "ok";
      document.getElementById("status").innerText = "localStorageから復元済";
      if (previewWindow && !previewWindow.closed) {
        previewWindow.postMessage({ type:"updateModel", data:model }, "*");
      }
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem("model");
      if (saved) {
        try {
          model = JSON.parse(saved);
          renderNodes();
          renderEdges();
          document.getElementById("status").className = "ok";
          document.getElementById("status").innerText = "localStorageから復元済";
        } catch(e) {
          document.getElementById("status").className = "error";
          document.getElementById("status").innerText = "復元失敗: " + e.message;
        }
      }
    }

    document.getElementById("fileInput").addEventListener("change", e => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          model = JSON.parse(ev.target.result);
          renderNodes();
          renderEdges();
          saveAndValidate();
          document.getElementById("status").className = "ok";
          document.getElementById("status").innerText = "読込成功 & バリデーションOK";
        } catch(err) {
          document.getElementById("status").className = "error";
          document.getElementById("status").innerText = "JSONパース失敗: " + err.message;
        }
      };
      reader.readAsText(file);
    });

    function download() {
      const blob = new Blob([JSON.stringify(model,null,2)], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "model.json";
      a.click();
    }

    function openPreview() {
      previewWindow = window.open("preview.html","3DSD Preview","width=800,height=600");
      setTimeout(()=>{ 
        if (previewWindow) previewWindow.postMessage({type:"updateModel",data:model},"*"); 
      },1000);
    }

    function createNumberCell(value, onChange, step=1, mode="linear") {
      const input = document.createElement("input");
      input.type = "number";
      input.value = value;
      input.step = step;
      input.addEventListener("change", ()=> onChange(parseFloat(input.value)));

      input.addEventListener("wheel", e=>{
        e.preventDefault();
        if (mode==="linear") {
          const newVal = parseFloat(input.value||0) + (e.deltaY<0? step:-step);
          input.value = newVal;
          onChange(newVal);
        } else if (mode==="pow2") {
          let current = parseFloat(input.value||1);
          if (current<=0) current=1;
          if (e.deltaY<0) current*=2;
          else current/=2;
          input.value=current;
          onChange(current);
        }
      });
      const td = document.createElement("td");
      td.appendChild(input);
      return td;
    }

    function createTextCell(value,onChange) {
      const input=document.createElement("input");
      input.type="text"; input.value=value||"";
      input.addEventListener("change",()=> onChange(input.value));
      const td=document.createElement("td"); td.appendChild(input); return td;
    }

    function createColorCell(value,onChange){
      const input=document.createElement("input");
      input.type="color"; input.value=value||"#000000";
      input.addEventListener("input",()=> onChange(input.value));
      const td=document.createElement("td"); td.appendChild(input); return td;
    }

    function renderNodes() {
      const tbl=document.getElementById("nodesTable");
      tbl.innerHTML="";
      const header=tbl.insertRow();
      ["ID","X","Y","Z","label.text","fontSize","plane"].forEach(h=>{
        const th=document.createElement("th"); th.innerText=h; header.appendChild(th);
      });
      model.nodes.forEach(node=>{
        const tr=tbl.insertRow();
        tr.appendChild(createTextCell(node.id||"",val=>{node.id=val; saveAndValidate();}));
        tr.appendChild(createNumberCell(node.position?.[0]??0,val=>{
          node.position=node.position||[0,0,0]; node.position[0]=val; saveAndValidate();
        },1,"linear"));
        tr.appendChild(createNumberCell(node.position?.[1]??0,val=>{
          node.position=node.position||[0,0,0]; node.position[1]=val; saveAndValidate();
        },1,"linear"));
        tr.appendChild(createNumberCell(node.position?.[2]??0,val=>{
          node.position=node.position||[0,0,0]; node.position[2]=val; saveAndValidate();
        },1,"linear"));
        tr.appendChild(createTextCell(node.label?.text||"",val=>{
          node.label=node.label||{}; node.label.text=val; saveAndValidate();
        }));
        tr.appendChild(createNumberCell(node.label?.fontSize??16,val=>{
          node.label=node.label||{}; node.label.fontSize=val; saveAndValidate();
        },1,"pow2"));
        tr.appendChild(createTextCell(node.label?.plane||"xy",val=>{
          node.label=node.label||{}; node.label.plane=val; saveAndValidate();
        }));
      });
    }

    function renderEdges(){
      const tbl=document.getElementById("edgesTable");
      tbl.innerHTML="";
      const header=tbl.insertRow();
      ["Source","Target","color","opacity","label.text","fontSize","plane","label.color","label.background","label.opacity"].forEach(h=>{
        const th=document.createElement("th"); th.innerText=h; header.appendChild(th);
      });
      model.edges.forEach(edge=>{
        const tr=tbl.insertRow();
        tr.appendChild(createTextCell(edge.source||"",val=>{edge.source=val; saveAndValidate();}));
        tr.appendChild(createTextCell(edge.target||"",val=>{edge.target=val; saveAndValidate();}));
        tr.appendChild(createColorCell(edge.color||"#000000",val=>{edge.color=val; saveAndValidate();}));
        tr.appendChild(createNumberCell(edge.opacity??1,val=>{edge.opacity=val; saveAndValidate();},0.1,"linear"));
        tr.appendChild(createTextCell(edge.label?.text||"",val=>{
          edge.label=edge.label||{}; edge.label.text=val; saveAndValidate();
        }));
        tr.appendChild(createNumberCell(edge.label?.fontSize??10,val=>{
          edge.label=edge.label||{}; edge.label.fontSize=val; saveAndValidate();
        },1,"pow2"));
        tr.appendChild(createTextCell(edge.label?.plane||"xy",val=>{
          edge.label=edge.label||{}; edge.label.plane=val; saveAndValidate();
        }));
        tr.appendChild(createColorCell(edge.label?.color||"#000000",val=>{
          edge.label=edge.label||{}; edge.label.color=val; saveAndValidate();
        }));
        tr.appendChild(createColorCell(edge.label?.background||"#ffffff",val=>{
          edge.label=edge.label||{}; edge.label.background=val; saveAndValidate();
        }));
        tr.appendChild(createNumberCell(edge.label?.opacity??1,val=>{
          edge.label=edge.label||{}; edge.label.opacity=val; saveAndValidate();
        },0.1,"linear"));
      });
    }

    loadFromLocalStorage();
  </script>
</body>
</html>
