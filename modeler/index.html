<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3DSD-modeler</title>

  <script type="importmap">
    {
      "imports": {
        "ajv": "https://esm.sh/ajv@8/dist/2020?bundle"
      }
    }
  </script>

  <style>
    body { font-family: sans-serif; margin: 1em; }
    .toolbar { margin-bottom: 1em; }
    #status { padding: 0.5em; margin-bottom: 1em; }
    #status.ok { background: #e6ffe6; color: #060; }
    #status.error { background: #ffe6e6; color: #900; }
    table { border-collapse: collapse; margin-top: 1em; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 4px; font-size: 0.9em; }
    th { background: #f0f0f0; }
    input[type="text"], input[type="number"] { width: 100%; }
    .section { margin-top: 2em; }
  </style>
</head>
<body>
  <h1>3DSD-modeler (Phase 2: Node Editing)</h1>

  <div class="toolbar">
    <input type="file" id="fileInput" accept=".json" />
    <button id="saveBtn">保存（ダウンロード）</button>
  </div>

  <div id="status">未検証</div>
  <div id="errors"></div>

  <div class="section">
    <h2>ノード一覧</h2>
    <button id="addNodeBtn">ノード追加</button>
    <table id="nodesTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>X</th>
          <th>Y</th>
          <th>Z</th>
          <th>ラベル</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2>エッジ一覧</h2>
    <button id="addEdgeBtn">エッジ追加</button>
    <table id="edgesTable">
        <thead>
          <tr>
            <th>From</th>
            <th>To</th>
            <th>色</th>
            <th>不透明度</th>
            <th>ラベル</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody></tbody>
    </table>
  </div>

  <script type="module">
    import Ajv from "ajv";

    let schema3dss = null;
    let modelData = null;

    // スキーマ読込
    fetch("../schemas/3DSS.schema.json")
      .then(r => r.json())
      .then(s => { schema3dss = s; setStatus("✅ スキーマ読込完了", "ok"); restoreFromLocal(); })
      .catch(err => setStatus("❌ スキーマ読込失敗: " + err, "error"));

    // ファイル読込
    document.getElementById("fileInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const text = await file.text();
      try {
        const json = JSON.parse(text);
        modelData = json;
        renderNodes();
        validateJson(json);
        localStorage.setItem("3dsd:model:current", JSON.stringify(modelData));
      } catch (err) {
        setStatus("❌ JSONパース失敗: " + err.message, "error");
      }
    });

    // 保存
    document.getElementById("saveBtn").addEventListener("click", () => {
      if (!modelData) { setStatus("⚠ データなし", "error"); return; }
      const blob = new Blob([JSON.stringify(modelData, null, 2) + "\n"], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "model.json";
      a.click();
      URL.revokeObjectURL(a.href);
      setStatus("💾 保存完了: model.json", "ok");
    });

    // ノード追加
    document.getElementById("addNodeBtn").addEventListener("click", () => {
      if (!modelData) return;
      const newId = "n" + (modelData.nodes.length + 1);
      const newNode = {
        id: newId,
        position: [0, 0, 0],
        label: { text: newId }
      };
      modelData.nodes.push(newNode);
      renderNodes();
      validateJson(modelData);
      localStorage.setItem("3dsd:model:current", JSON.stringify(modelData));
    });

    // ノード描画
    function renderNodes() {
      const tbody = document.querySelector("#nodesTable tbody");
      tbody.innerHTML = "";
      if (!modelData || !modelData.nodes) return;

      modelData.nodes.forEach((node, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td><input type="text" value="${node.id}"></td>
          <td><input type="number" value="${node.position[0]}"></td>
          <td><input type="number" value="${node.position[1]}"></td>
          <td><input type="number" value="${node.position[2]}"></td>
          <td><input type="text" value="${node.label.text}"></td>
          <td><button data-index="${index}" class="deleteBtn">削除</button></td>
        `;

        // 入力変更時に反映
        const inputs = tr.querySelectorAll("input");
        inputs[0].addEventListener("input", e => { node.id = e.target.value; saveAndValidate(); });
        inputs[1].addEventListener("input", e => { node.position[0] = parseFloat(e.target.value); saveAndValidate(); });
        inputs[2].addEventListener("input", e => { node.position[1] = parseFloat(e.target.value); saveAndValidate(); });
        inputs[3].addEventListener("input", e => { node.position[2] = parseFloat(e.target.value); saveAndValidate(); });
        inputs[4].addEventListener("input", e => { node.label.text = e.target.value; saveAndValidate(); });

        // 削除ボタン
        tr.querySelector(".deleteBtn").addEventListener("click", () => {
          modelData.nodes.splice(index, 1);
          renderNodes();
          saveAndValidate();
        });

        tbody.appendChild(tr);
      });
        renderEdges();
    }

    // エッジ追加
    document.getElementById("addEdgeBtn").addEventListener("click", () => {
      if (!modelData) return;
      const newEdge = {
      from: modelData.nodes.length > 0 ? modelData.nodes[0].id : "",
      to: modelData.nodes.length > 1 ? modelData.nodes[1].id : "",
      color: "#ffffff",
      opacity: 1.0,
      label: { text: "edge" }
      };
    modelData.edges.push(newEdge);
      renderEdges();
      saveAndValidate();
    });

    // エッジ描画
    function renderEdges() {
      const tbody = document.querySelector("#edgesTable tbody");
      tbody.innerHTML = "";
        if (!modelData || !modelData.edges) return;

    modelData.edges.forEach((edge, index) => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td><input type="text" value="${edge.from}"></td>
        <td><input type="text" value="${edge.to}"></td>
        <td><input type="text" value="${edge.color || ""}"></td>
        <td><input type="number" step="0.1" value="${edge.opacity ?? 1.0}"></td>
        <td><input type="text" value="${edge.label?.text || ""}"></td>
        <td><button data-index="${index}" class="deleteEdgeBtn">削除</button></td>
    `;

        const inputs = tr.querySelectorAll("input");
        inputs[0].addEventListener("input", e => { edge.from = e.target.value; saveAndValidate(); });
        inputs[1].addEventListener("input", e => { edge.to = e.target.value; saveAndValidate(); });
        inputs[2].addEventListener("input", e => { edge.color = e.target.value; saveAndValidate(); });
        inputs[3].addEventListener("input", e => { edge.opacity = parseFloat(e.target.value); saveAndValidate(); });
        inputs[4].addEventListener("input", e => { edge.label.text = e.target.value; saveAndValidate(); });

      tr.querySelector(".deleteEdgeBtn").addEventListener("click", () => {
        modelData.edges.splice(index, 1);
        renderEdges();
        saveAndValidate();
      });
      tbody.appendChild(tr);
    });
  }

    // 保存 & バリデーション
    function saveAndValidate() {
      localStorage.setItem("3dsd:model:current", JSON.stringify(modelData));
      validateJson(modelData);
    }

    // JSONバリデーション
    function validateJson(json) {
      if (!schema3dss) return;
      const ajv = new Ajv({ allErrors: true, strict: false });
      const validate = ajv.compile(schema3dss);
      const valid = validate(json);
      if (!valid) {
        setStatus("❌ バリデーションエラー", "error");
        renderErrors(validate.errors);
      } else {
        setStatus("✅ 読込成功 & バリデーションOK", "ok");
        clearErrors();
      }
    }

    // localStorage 復元
    function restoreFromLocal() {
      const saved = localStorage.getItem("3dsd:model:current");
      if (!saved) return;
      try {
        const json = JSON.parse(saved);
        modelData = json;
        renderNodes();
        validateJson(json);
        setStatus("🔄 localStorageから復元済", "ok");
      } catch (err) {
        setStatus("❌ 復元失敗: " + err.message, "error");
      }
    }

    // ステータス表示
    function setStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = type;
    }

    // エラー一覧表示
    function renderErrors(errors) {
      const container = document.getElementById("errors");
      container.innerHTML = "";
      if (!errors || errors.length === 0) return;

      const table = document.createElement("table");
      table.innerHTML = `
        <tr><th>インスタンスパス</th><th>メッセージ</th></tr>
      `;
      errors.forEach(err => {
        const tr = document.createElement("tr");
        const tdPath = document.createElement("td");
        tdPath.textContent = err.instancePath || "(root)";
        const tdMsg = document.createElement("td");
        tdMsg.textContent = err.message;
        tr.appendChild(tdPath);
        tr.appendChild(tdMsg);
        table.appendChild(tr);
      });
      container.appendChild(table);
    }

    // エラー消去
    function clearErrors() {
      document.getElementById("errors").innerHTML = "";
    }
  </script>
</body>
</html>
