<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3DSD-modeler</title>

  <script type="importmap">
    {
      "imports": {
        "ajv": "https://esm.sh/ajv@8/dist/2020?bundle"
      }
    }
  </script>

  <style>
    body { 
        font-family: sans-serif; margin: 1em;
        display: grid;
        grid-template-columns: 1fr 2fr 1fr; /* 左:ノード 中央:プレビュー 右:エッジ */
        grid-gap: 1em;
    }
    .toolbar {
        margin-bottom: 1em;
        grid-column: 1 / span 3; /* ヘッダーは横並び */
    }
    #status { padding: 0.5em; margin-bottom: 1em; }
    #status.ok { background: #e6ffe6; color: #060; }
    #status.error { background: #ffe6e6; color: #900; }
    table {
  border-collapse: collapse;
  margin: 10px 0;
  width: auto;
}
table th, table td {
  border: 1px solid #ccc;
  padding: 2px 4px;
  text-align: center;
  min-width: 60px; /* 数値セルが潰れないよう最低幅を確保 */
}
table input, table select {
  width: 100%;
  box-sizing: border-box;
}
    input.default, select.default { color: #888; }
    .required { background: #ffe; }
    .section {
        overflow: auto;
        max-height: 80vh;
        margin-top: 2em; }
    #preview {
      border: 1px solid #ccc;
      background: #fafafa;
      min-height: 400px;
      text-align: center;
      line-height: 400px;
      color: #888;
</style>
</head>
<body>
  <h1>3DSD-modeler (Phase 2: Node Editing)</h1>

  <div class="toolbar">
    <input type="file" id="fileInput" accept=".json" />
    <button id="saveBtn">保存（ダウンロード）</button>
    <button id="previewBtn">プレビューを開く</button>
  </div>

  <div id="status">未検証</div>
  <div id="errors"></div>

<div class="section" id="nodesSection">
  <h2>ノード一覧</h2>
    <table id="nodesTable">
      <thead>
        <tr>
          <th class="required">ID</th>
          <th>X</th>
          <th>Y</th>
          <th>Z</th>
          <th class="required">label.text</th>
          <th>fontSize</th>
          <th>plane</th>
          <th>color</th>
          <th>background</th>
          <th>opacity</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section" id="preview">

  </div>

  <div class="section" id="edgesSection">
    <h2>エッジ一覧</h2>
    <table id="edgesTable">
      <thead>
        <tr>
          <th class="required">Source</th>
          <th class="required">Target</th>
          <th>color</th>
          <th>opacity</th>
          <th>label.text</th>
          <th>fontSize</th>
          <th>plane</th>
          <th>label.color</th>
          <th>label.background</th>
          <th>label.opacity</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script type="module">
    import Ajv from "ajv";

    let schema3dss = null;
    let modelData = null;
    let previewWindow = null;

    // スキーマ読込
    fetch("../schemas/3DSS.schema.json")
      .then(r => r.json())
      .then(s => { schema3dss = s; setStatus("✅ スキーマ読込完了", "ok"); restoreFromLocal(); })
      .catch(err => setStatus("❌ スキーマ読込失敗: " + err, "error"));

    // ファイル読込
    document.getElementById("fileInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const text = await file.text();
      try {
        const json = JSON.parse(text);
        modelData = json;
        renderNodes();
        validateJson(json);
        localStorage.setItem("3dsd:model:current", JSON.stringify(modelData));
      } catch (err) {
        setStatus("❌ JSONパース失敗: " + err.message, "error");
      }
    });

    // 保存
    document.getElementById("saveBtn").addEventListener("click", () => {
      if (!modelData) { setStatus("⚠ データなし", "error"); return; }
      const blob = new Blob([JSON.stringify(modelData, null, 2) + "\n"], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "model.json";
      a.click();
      URL.revokeObjectURL(a.href);
      setStatus("💾 保存完了: model.json", "ok");
    });

    // プレビュー
    document.getElementById("previewBtn").addEventListener("click", () => {
      if (!previewWindow || previewWindow.closed) {
        previewWindow = window.open("preview.html", "3DSDPreview", "width=800,height=600");
        setStatus("🔲 プレビューウィンドウを開きました", "ok");
      } else {
        previewWindow.focus();
      }
    // 開いた直後にもデータ送信
      if (modelData) {
        setTimeout(() => {
        previewWindow.postMessage({ type: "updateModel", data: modelData }, "*");
        }, 500);
      }
    });

    // saveAndValidate でプレビュー更新も送信
    function saveAndValidate() {
      localStorage.setItem("3dsd:model:current", JSON.stringify(modelData));
      validateJson(modelData);

      if (previewWindow && !previewWindow.closed) {
        previewWindow.postMessage({ type: "updateModel", data: modelData }, "*");
      }
    }



    // ノード描画
    function renderNodes() {
  const tbody = document.querySelector("#nodesTable tbody");
  tbody.innerHTML = "";

  nodes.forEach((node, i) => {
    const tr = document.createElement("tr");

    // ID
    const idCell = document.createElement("td");
    idCell.textContent = node.id;
    tr.appendChild(idCell);

    // X, Y, Z
    const xCell = document.createElement("td");
    xCell.appendChild(
      createNumberCell(node.position?.[0] ?? 0, val => {
        node.position[0] = val;
        saveAndValidate();
      })
    );
    tr.appendChild(xCell);

    const yCell = document.createElement("td");
    yCell.appendChild(
      createNumberCell(node.position?.[1] ?? 0, val => {
        node.position[1] = val;
        saveAndValidate();
      })
    );
    tr.appendChild(yCell);

    const zCell = document.createElement("td");
    zCell.appendChild(
      createNumberCell(node.position?.[2] ?? 0, val => {
        node.position[2] = val;
        saveAndValidate();
      })
    );
    tr.appendChild(zCell);

    // label.text
    const textCell = document.createElement("td");
    const textInput = document.createElement("input");
    textInput.type = "text";
    textInput.value = node.label?.text || "";
    textInput.addEventListener("input", () => {
      node.label.text = textInput.value;
      saveAndValidate();
    });
    textCell.appendChild(textInput);
    tr.appendChild(textCell);

    // fontSize（スクロール可能）
    const fontSizeCell = document.createElement("td");
    fontSizeCell.appendChild(
      createNumberCell(node.label?.fontSize ?? 16, val => {
        node.label.fontSize = val;
        saveAndValidate();
      })
    );
    tr.appendChild(fontSizeCell);

    // plane
    const planeCell = document.createElement("td");
    const planeSelect = document.createElement("select");
    ["xy", "yz", "zx"].forEach(opt => {
      const option = document.createElement("option");
      option.value = opt;
      option.textContent = opt;
      if (node.label?.plane === opt) option.selected = true;
      planeSelect.appendChild(option);
    });
    planeSelect.addEventListener("change", () => {
      node.label.plane = planeSelect.value;
      saveAndValidate();
    });
    planeCell.appendChild(planeSelect);
    tr.appendChild(planeCell);

    // color, background
    ["color", "background"].forEach(key => {
      const cell = document.createElement("td");
      const input = document.createElement("input");
      input.type = "color";
      input.value = node.label?.[key] || "#000000";
      input.addEventListener("input", () => {
        node.label[key] = input.value;
        saveAndValidate();
      });
      cell.appendChild(input);
      tr.appendChild(cell);
    });

    // opacity（スクロール可能）
    const opacityCell = document.createElement("td");
    opacityCell.appendChild(
      createNumberCell(node.label?.opacity ?? 1, val => {
        node.label.opacity = val;
        saveAndValidate();
      }, 0.1) // 小数対応
    );
    tr.appendChild(opacityCell);

    // 削除ボタン
    const actionCell = document.createElement("td");
    const delButton = document.createElement("button");
    delButton.textContent = "除";
    delButton.addEventListener("click", () => {
      nodes.splice(i, 1);
      saveAndValidate();
      renderNodes();
    });
    actionCell.appendChild(delButton);
    tr.appendChild(actionCell);

    tbody.appendChild(tr);
  });
}

    // エッジ描画
    function renderEdges() {
      const tbody = document.querySelector("#edgesTable tbody");
      tbody.innerHTML = "";
        if (!modelData || !modelData.edges) return;

    modelData.edges.forEach((edge, index) => {
      const tr = document.createElement("tr");
      const elabel = edge.label || {};
      tr.innerHTML = `
<td><input type="text" value="${edge.source}"></td>
          <td><input type="text" value="${edge.target}"></td>
          <td><input type="text" value="${edge.color ?? ""}"></td>
          <td><input type="number" step="0.1" value="${edge.opacity ?? 1.0}"></td>
          <td><input type="text" value="${elabel.text ?? ""}"></td>
          <td><input type="number" value="${elabel.fontSize ?? 10}" class="${elabel.fontSize==null?"default":""}"></td>
          <td>
            <select class="${elabel.plane==null?"default":""}">
              <option value="xy" ${elabel.plane==="xy"?"selected":""}>xy</option>
              <option value="yz" ${elabel.plane==="yz"?"selected":""}>yz</option>
              <option value="zx" ${elabel.plane==="zx"?"selected":""}>zx</option>
            </select>
          </td>
          <td><input type="text" value="${elabel.color ?? "#000"}" class="${elabel.color==null?"default":""}"></td>
          <td><input type="text" value="${elabel.background ?? ""}" class="${elabel.background==null?"default":""}"></td>
          <td><input type="number" step="0.1" value="${elabel.opacity ?? 1.0}" class="${elabel.opacity==null?"default":""}"></td>
          <td><button data-index="${index}" class="deleteEdgeBtn">除</button></td>
        `;

        const inputs = tr.querySelectorAll("input, select");
        inputs[0].addEventListener("input", e => { edge.source = e.target.value; saveAndValidate(); });
        inputs[1].addEventListener("input", e => { edge.target = e.target.value; saveAndValidate(); });
        inputs[2].addEventListener("input", e => { edge.color = e.target.value; saveAndValidate(); });
        inputs[3].addEventListener("input", e => { edge.opacity = parseFloat(e.target.value); saveAndValidate(); });
        inputs[4].addEventListener("input", e => { elabel.text = e.target.value; edge.label = elabel; saveAndValidate(); });
        inputs[5].addEventListener("input", e => { updateField(e, elabel, "fontSize"); edge.label = elabel; });
        inputs[6].addEventListener("change", e => { updateField(e, elabel, "plane"); edge.label = elabel; });
        inputs[7].addEventListener("input", e => { updateField(e, elabel, "color"); edge.label = elabel; });
        inputs[8].addEventListener("input", e => { updateField(e, elabel, "background"); edge.label = elabel; });
        inputs[9].addEventListener("input", e => { updateField(e, elabel, "opacity", parseFloat); edge.label = elabel; });

        tr.querySelector(".deleteEdgeBtn").addEventListener("click", () => {
          modelData.edges.splice(index, 1);
          renderEdges();
          saveAndValidate();
        });

        tbody.appendChild(tr);
      });
    }

    // 共通 updateField
    function updateField(e, obj, key, parseFn) {
      const val = e.target.value.trim();
      if (val === "" || (key==="background" && val==="")) {
        delete obj[key];
        e.target.classList.add("default");
      } else {
        obj[key] = parseFn ? parseFn(val) : val;
        e.target.classList.remove("default");
      }
      saveAndValidate();
    }

function createNumberCell(value, onChange, step = 1) {
  const input = document.createElement("input");
  input.type = "number";
  input.value = value;
  input.style.width = "60px";

  // スクロールで値変更
  input.addEventListener("wheel", e => {
    e.preventDefault();
    let delta = e.deltaY < 0 ? step : -step;
    if (e.shiftKey) delta *= 10;
    if (e.ctrlKey) delta *= 100;
    input.value = parseFloat(input.value || 0) + delta;
    onChange(parseFloat(input.value));
  });

  // 手入力でも反映
  input.addEventListener("change", () => {
    onChange(parseFloat(input.value));
  });

  return input;
}

  // JSONバリデーション
    function validateJson(json) {
      if (!schema3dss) return;
      const ajv = new Ajv({ allErrors: true, strict: false });
      const validate = ajv.compile(schema3dss);
      const valid = validate(json);
      if (!valid) {
        setStatus("❌ バリデーションエラー", "error");
        renderErrors(validate.errors);
      } else {
        setStatus("✅ 読込成功 & バリデーションOK", "ok");
        clearErrors();
      }
    }

    // localStorage 復元
    function restoreFromLocal() {
      const saved = localStorage.getItem("3dsd:model:current");
      if (!saved) return;
      try {
        const json = JSON.parse(saved);
        modelData = json;
        renderNodes();
        validateJson(json);
        setStatus("🔄 localStorageから復元済", "ok");
      } catch (err) {
        setStatus("❌ 復元失敗: " + err.message, "error");
      }
    }

    // ステータス表示
    function setStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = type;
    }

    // エラー一覧表示
 function renderErrors(errors) {
      const container = document.getElementById("errors");
      container.innerHTML = "";
      if (!errors || errors.length === 0) return;
      const table = document.createElement("table");
      table.innerHTML = `<tr><th>インスタンスパス</th><th>メッセージ</th></tr>`;
      errors.forEach(err => {
        const tr = document.createElement("tr");
        const tdPath = document.createElement("td");
        tdPath.textContent = err.instancePath || "(root)";
        const tdMsg = document.createElement("td");
        tdMsg.textContent = err.message;
        tr.appendChild(tdPath);
        tr.appendChild(tdMsg);
        table.appendChild(tr);
      });
      container.appendChild(table);
    }

    // エラー消去
    function clearErrors() {
      document.getElementById("errors").innerHTML = "";
    }
  </script>
</body>
</html>
